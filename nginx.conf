server {
    listen 80;
    server_name syedasif27.duckdns.org;

    # No static files needed anymore — GitHub Pages handles that

    location /send-mail {
        proxy_pass         http://127.0.0.1:3000/send-mail;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # Only allow POST and OPTIONS (CORS preflight)
        limit_except POST OPTIONS { deny all; }
    }
}
